name: Build macOS Client

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Setup native plugin
        run: |
          cd macos
          gem install xcodeproj --no-document
          bash setup_plugin.sh

      - name: Build macOS release
        run: flutter build macos --release

      - name: Create DMG
        run: |
          APP_PATH="build/macos/Build/Products/Release/muphone_client.app"
          hdiutil create -volname "MUPhone Client" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "build/MUPhone_Client_macOS.dmg"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: MUPhone-Client-macOS
          path: build/MUPhone_Client_macOS.dmg
          retention-days: 30
